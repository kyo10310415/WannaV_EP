<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント管理 - WannaV エントリープラン</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- パスワードリセットモーダル -->
    <div id="password-reset-modal" style="
        display: none; position: fixed; inset: 0; z-index: 1000;
        background: rgba(7,16,24,0.85); backdrop-filter: blur(6px);
        justify-content: center; align-items: center;">
        <div style="
            background: var(--card-bg); border-radius: 20px; padding: 40px;
            width: 100%; max-width: 440px; border: 1px solid rgba(74,144,217,0.4);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);">
            <h2 style="margin-bottom: 8px; padding-bottom: 10px;">🔑 パスワード変更</h2>
            <p style="color: var(--gray-text); font-size: 14px; margin-bottom: 24px;">
                対象ユーザー：<strong id="reset-modal-username" style="color: var(--primary-blue-light);"></strong>
            </p>
            <div class="form-group">
                <label class="form-label">新しいパスワード（4文字以上）</label>
                <input type="password" class="form-input" id="reset-new-password" placeholder="新しいパスワード">
            </div>
            <div class="form-group">
                <label class="form-label">パスワード確認</label>
                <input type="password" class="form-input" id="reset-confirm-password" placeholder="もう一度入力">
            </div>
            <div style="display: flex; gap: 16px; margin-top: 28px;">
                <button onclick="submitPasswordReset()" class="btn btn-primary" style="flex: 1;">✅ 変更する</button>
                <button onclick="closePasswordReset()" class="btn btn-secondary" style="flex: 1;">キャンセル</button>
            </div>
        </div>
    </div>

    <div class="header">
        <div class="header-content">
            <h1 class="logo">✨ WannaV エントリープラン</h1>
            <div class="user-info">
                <span class="user-name" id="user-name"></span>
                <button onclick="logout()" class="btn btn-secondary">ログアウト</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="nav" id="admin-nav">
            <a href="/dashboard" class="nav-link">📊 ダッシュボード</a>
            <a href="/admin/accounts" class="nav-link active">👥 アカウント管理</a>
            <a href="/admin/contents" class="nav-link">📹 コンテンツ管理</a>
            <a href="/admin/users" class="nav-link">📈 ユーザー進捗管理</a>
            <a href="/students" class="nav-link">🎓 生徒一覧</a>
        </div>

        <div id="alert-container"></div>

        <!-- アカウント追加 -->
        <div class="card">
            <h2 style="margin-bottom: 8px;">➕ 新規アカウント作成</h2>
            <p style="color: var(--gray-text); font-size: 13px; margin-bottom: 24px;">
                初期パスワードは <code style="background:rgba(74,144,217,0.15); padding:2px 8px; border-radius:6px; color:var(--accent-cyan);">1111</code> で固定されます。初回ログイン時にパスワード変更が必須となります。
            </p>
            <form id="create-user-form">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;">
                    <div class="form-group" style="margin:0;">
                        <label class="form-label">ユーザー名（ログインID）</label>
                        <input type="text" class="form-input" id="new-username" placeholder="例：tanaka_hanako" required autocomplete="off">
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label class="form-label">名前（表示名）</label>
                        <input type="text" class="form-input" id="new-name" placeholder="例：田中 花子" required>
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label class="form-label">権限</label>
                        <select class="form-select" id="new-role" required>
                            <option value="生徒">生徒</option>
                            <option value="クルー">クルー</option>
                            <option value="管理者">管理者</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-success" style="margin-top: 24px;">
                    ✅ アカウント作成
                </button>
            </form>
        </div>

        <!-- アカウント一覧 -->
        <div class="card">
            <h2 style="margin-bottom: 30px;">📋 アカウント一覧</h2>
            <div id="users-container">
                <div class="loading" style="margin: 50px auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        // ===== パスワードリセットモーダル =====
        let resetTargetId = null;

        function openPasswordReset(userId, userName) {
            resetTargetId = userId;
            document.getElementById('reset-modal-username').textContent = userName;
            document.getElementById('reset-new-password').value = '';
            document.getElementById('reset-confirm-password').value = '';
            document.getElementById('password-reset-modal').style.display = 'flex';
        }

        function closePasswordReset() {
            document.getElementById('password-reset-modal').style.display = 'none';
            resetTargetId = null;
        }

        async function submitPasswordReset() {
            const newPw = document.getElementById('reset-new-password').value;
            const confirmPw = document.getElementById('reset-confirm-password').value;

            if (!newPw || newPw.length < 4) {
                showAlert('パスワードは4文字以上で入力してください', 'error');
                return;
            }
            if (newPw !== confirmPw) {
                showAlert('パスワードが一致しません', 'error');
                return;
            }

            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`${API_URL}/admin/users/${resetTargetId}/password`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ newPassword: newPw })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'パスワードリセットに失敗しました');
                }

                closePasswordReset();
                showAlert('パスワードをリセットしました ✅', 'success');
            } catch (error) {
                console.error('パスワードリセットエラー:', error);
                showAlert(error.message, 'error');
            }
        }

        // 認証チェック
        async function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('認証失敗');

                const user = await response.json();
                document.getElementById('user-name').textContent = user.name;

                if (user.role !== '管理者') {
                    alert('管理者権限が必要です');
                    window.location.href = '/dashboard';
                    return;
                }

                loadUsers();
            } catch (error) {
                console.error('認証エラー:', error);
                localStorage.removeItem('token');
                window.location.href = '/';
            }
        }

        // ユーザー一覧読み込み
        async function loadUsers() {
            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const users = await response.json();
                renderUsers(users);
            } catch (error) {
                console.error('ユーザー読み込みエラー:', error);
                showAlert('ユーザーの読み込みに失敗しました', 'error');
            }
        }

        // ユーザー描画
        function renderUsers(users) {
            const container = document.getElementById('users-container');

            if (users.length === 0) {
                container.innerHTML = '<p style="color: var(--gray-text);">ユーザーがいません</p>';
                return;
            }

            let html = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>ユーザー名</th>
                            <th>名前</th>
                            <th>権限</th>
                            <th>PW変更</th>
                            <th>登録日</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            users.forEach(user => {
                const createdDate = new Date(user.created_at).toLocaleDateString('ja-JP');
                const pwChanged = user.password_changed_at
                    ? `<span style="color:#6AEBB7; font-size:12px;">✅ 変更済み</span>`
                    : `<span style="color:#F7C55B; font-size:12px;">⚠️ 未変更</span>`;

                html += `
                    <tr>
                        <td>
                            <code style="background:rgba(74,144,217,0.12); padding:3px 8px; border-radius:6px; color:var(--primary-blue-light); font-size:13px;">
                                ${user.username || user.email.split('@')[0]}
                            </code>
                        </td>
                        <td style="font-weight:600;">${user.name}</td>
                        <td>
                            <select onchange="updateRole(${user.id}, this.value)" style="padding: 8px 12px; border-radius: 10px; background: rgba(15, 15, 30, 0.8); color: white; border: 2px solid rgba(74, 144, 217, 0.3); font-size:13px;">
                                <option value="生徒" ${user.role === '生徒' ? 'selected' : ''}>生徒</option>
                                <option value="クルー" ${user.role === 'クルー' ? 'selected' : ''}>クルー</option>
                                <option value="管理者" ${user.role === '管理者' ? 'selected' : ''}>管理者</option>
                            </select>
                        </td>
                        <td>${pwChanged}</td>
                        <td style="color:var(--gray-text); font-size:13px;">${createdDate}</td>
                        <td style="display:flex; gap:8px; flex-wrap:wrap;">
                            <button onclick="openPasswordReset(${user.id}, '${user.name}')" class="btn btn-warning" style="padding: 8px 16px; font-size: 13px; min-width:auto; min-height:auto;">
                                🔑 PW変更
                            </button>
                            <button onclick="deleteUser(${user.id}, '${user.name}')" class="btn btn-danger" style="padding: 8px 16px; font-size: 13px; min-width:auto; min-height:auto;">
                                🗑️ 削除
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // ユーザー作成
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('create-user-form').addEventListener('submit', async (e) => {
                e.preventDefault();

                const token = localStorage.getItem('token');
                const data = {
                    username: document.getElementById('new-username').value.trim(),
                    name: document.getElementById('new-name').value.trim(),
                    role: document.getElementById('new-role').value
                };

                if (!data.username) {
                    showAlert('ユーザー名を入力してください', 'error');
                    return;
                }

                try {
                    const response = await fetch(`${API_URL}/admin/users`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(data)
                    });

                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.error || 'アカウント作成に失敗しました');
                    }

                    showAlert(`アカウントを作成しました。初期パスワード: 1111`, 'success');
                    document.getElementById('create-user-form').reset();
                    loadUsers();
                } catch (error) {
                    console.error('アカウント作成エラー:', error);
                    showAlert(error.message, 'error');
                }
            });
        });

        // 権限更新
        async function updateRole(userId, newRole) {
            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/admin/users/${userId}/role`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ role: newRole })
                });

                if (!response.ok) throw new Error('権限更新に失敗しました');
                showAlert('権限を更新しました', 'success');
            } catch (error) {
                console.error('権限更新エラー:', error);
                showAlert(error.message, 'error');
                loadUsers();
            }
        }

        // ユーザー削除
        async function deleteUser(userId, userName) {
            if (!confirm(`${userName}を削除してもよろしいですか？`)) return;

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/admin/users/${userId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('削除に失敗しました');
                showAlert('ユーザーを削除しました', 'success');
                loadUsers();
            } catch (error) {
                console.error('削除エラー:', error);
                showAlert(error.message, 'error');
            }
        }

        // アラート表示
        function showAlert(message, type) {
            const container = document.getElementById('alert-container');
            container.innerHTML = `
                <div class="alert alert-${type === 'error' ? 'error' : 'success'}">
                    ${message}
                </div>
            `;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        // ログアウト
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }

        checkAuth();
    </script>
</body>
</html>
