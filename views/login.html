<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - WannaV eラーニング</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container" style="max-width: 500px; margin-top: 100px;">
        <div class="card" style="text-align: center;">
            <h1 class="logo" style="font-size: 48px; margin-bottom: 40px;">✨ WannaV</h1>
            
            <div id="alert-container"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">メールアドレス</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="mail@example.com"
                        required
                        autocomplete="email"
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">パスワード</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="パスワードを入力"
                        required
                        autocomplete="current-password"
                    >
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 30px;">
                    🚀 ログイン
                </button>
            </form>
            
            <div style="margin-top: 30px; padding: 20px; background: rgba(15, 15, 30, 0.6); border-radius: 15px;">
                <p style="color: var(--gray-text); font-size: 14px; margin-bottom: 10px;">
                    デフォルト管理者アカウント
                </p>
                <p style="color: var(--primary-pink); font-weight: bold;">
                    admin@wannav.com / admin123
                </p>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
