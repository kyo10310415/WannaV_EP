<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生徒用アカウント管理 - WannaV エントリープラン</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- パスワードリセットモーダル（管理者のみ表示） -->
    <div id="password-reset-modal" style="
        display: none; position: fixed; inset: 0; z-index: 1000;
        background: rgba(7,16,24,0.85); backdrop-filter: blur(6px);
        justify-content: center; align-items: center;">
        <div style="
            background: var(--card-bg); border-radius: 20px; padding: 40px;
            width: 100%; max-width: 440px; border: 1px solid rgba(74,144,217,0.4);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);">
            <h2 style="margin-bottom: 8px; padding-bottom: 10px;">🔑 パスワード変更</h2>
            <p style="color: var(--gray-text); font-size: 14px; margin-bottom: 24px;">
                対象ユーザー：<strong id="reset-modal-username" style="color: var(--primary-blue-light);"></strong>
            </p>
            <div class="form-group">
                <label class="form-label">新しいパスワード（4文字以上）</label>
                <input type="password" class="form-input" id="reset-new-password" placeholder="新しいパスワード">
            </div>
            <div class="form-group">
                <label class="form-label">パスワード確認</label>
                <input type="password" class="form-input" id="reset-confirm-password" placeholder="もう一度入力">
            </div>
            <div style="display: flex; gap: 16px; margin-top: 28px;">
                <button onclick="submitPasswordReset()" class="btn btn-primary" style="flex: 1;">✅ 変更する</button>
                <button onclick="closePasswordReset()" class="btn btn-secondary" style="flex: 1;">キャンセル</button>
            </div>
        </div>
    </div>

    <div class="header">
        <div class="header-content">
            <h1 class="logo">✨ WannaV エントリープラン</h1>
            <div class="user-info">
                <span class="user-name" id="user-name"></span>
                <button onclick="logout()" class="btn btn-secondary">ログアウト</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="nav" id="admin-nav"></div>

        <div id="alert-container"></div>

        <!-- アカウント追加 -->
        <div class="card">
            <h2 style="margin-bottom: 8px;">➕ 生徒アカウント作成</h2>
            <p style="color: var(--gray-text); font-size: 13px; margin-bottom: 24px;">
                権限は <code style="background:rgba(74,144,217,0.15); padding:2px 8px; border-radius:6px; color:var(--accent-cyan);">生徒</code> 固定です。
                初期パスワードは <code style="background:rgba(74,144,217,0.15); padding:2px 8px; border-radius:6px; color:var(--accent-cyan);">1111</code> で固定されます。初回ログイン時にパスワード変更が必須となります。
            </p>
            <form id="create-user-form">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;">
                    <div class="form-group" style="margin:0;">
                        <label class="form-label">ユーザー名（ログインID）</label>
                        <input type="text" class="form-input" id="new-username" placeholder="例：tanaka_hanako" required autocomplete="off">
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label class="form-label">名前（表示名）</label>
                        <input type="text" class="form-input" id="new-name" placeholder="例：田中 花子" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-success" style="margin-top: 24px;">
                    ✅ 生徒アカウント作成
                </button>
            </form>
        </div>

        <!-- 生徒アカウント一覧 -->
        <div class="card">
            <h2 style="margin-bottom: 30px;">📋 生徒アカウント一覧</h2>
            <div id="users-container">
                <div class="loading" style="margin: 50px auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let currentUser = null;

        // ===== パスワードリセットモーダル（管理者のみ） =====
        let resetTargetId = null;

        function openPasswordReset(userId, userName) {
            resetTargetId = userId;
            document.getElementById('reset-modal-username').textContent = userName;
            document.getElementById('reset-new-password').value = '';
            document.getElementById('reset-confirm-password').value = '';
            document.getElementById('password-reset-modal').style.display = 'flex';
        }

        function closePasswordReset() {
            document.getElementById('password-reset-modal').style.display = 'none';
            resetTargetId = null;
        }

        async function submitPasswordReset() {
            const newPw = document.getElementById('reset-new-password').value;
            const confirmPw = document.getElementById('reset-confirm-password').value;
            if (!newPw || newPw.length < 4) { showAlert('パスワードは4文字以上で入力してください', 'error'); return; }
            if (newPw !== confirmPw) { showAlert('パスワードが一致しません', 'error'); return; }
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`${API_URL}/admin/users/${resetTargetId}/password`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newPassword: newPw })
                });
                if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'PW変更失敗'); }
                closePasswordReset();
                showAlert('パスワードをリセットしました ✅', 'success');
            } catch (err) { showAlert(err.message, 'error'); }
        }

        // ===== 認証チェック =====
        async function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/'; return; }
            try {
                const res = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('認証失敗');
                const user = await res.json();
                currentUser = user;
                document.getElementById('user-name').textContent = user.name;

                // 管理者・セールスのみアクセス可
                if (user.role !== '管理者' && user.role !== 'セールス') {
                    alert('アクセス権限がありません');
                    window.location.href = '/dashboard';
                    return;
                }

                buildNav('admin-nav', user.role, '/admin/students-accounts');
                loadStudentUsers();
            } catch (err) {
                console.error('認証エラー:', err);
                localStorage.removeItem('token');
                window.location.href = '/';
            }
        }

        // ===== 生徒ユーザー一覧読み込み =====
        async function loadStudentUsers() {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`${API_URL}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const users = await res.json();
                // 生徒のみ表示
                renderUsers(users.filter(u => u.role === '生徒'));
            } catch (err) {
                console.error('ユーザー読み込みエラー:', err);
                showAlert('ユーザーの読み込みに失敗しました', 'error');
            }
        }

        // ===== 生徒テーブル描画 =====
        function renderUsers(users) {
            const container = document.getElementById('users-container');
            document.getElementById('student-count') && (document.getElementById('student-count').textContent = `${users.length} 名`);

            if (users.length === 0) {
                container.innerHTML = '<p style="color: var(--gray-text);">生徒アカウントがまだありません</p>';
                return;
            }

            const isAdmin = currentUser && currentUser.role === '管理者';

            let html = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>ユーザー名</th>
                            <th>名前</th>
                            <th>PW変更</th>
                            <th>登録日</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            users.forEach(user => {
                const createdDate = new Date(user.created_at).toLocaleDateString('ja-JP');
                const pwChanged = user.password_changed_at
                    ? `<span style="color:#6AEBB7; font-size:12px;">✅ 変更済み</span>`
                    : `<span style="color:#F7C55B; font-size:12px;">⚠️ 未変更</span>`;

                // 管理者: PW変更・削除ボタン表示 / セールス: 削除ボタンなし・PW変更なし
                const actionCell = isAdmin
                    ? `<button onclick="openPasswordReset(${user.id}, '${user.name}')" class="btn btn-warning" style="padding:8px 16px; font-size:13px; min-width:auto; min-height:auto;">
                          🔑 PW変更
                       </button>
                       <button onclick="deleteUser(${user.id}, '${user.name}')" class="btn btn-danger" style="padding:8px 16px; font-size:13px; min-width:auto; min-height:auto;">
                          🗑️ 削除
                       </button>`
                    : '<span style="color:var(--gray-text); font-size:12px;">—</span>';

                html += `
                    <tr>
                        <td>
                            <code style="background:rgba(74,144,217,0.12); padding:3px 8px; border-radius:6px; color:var(--primary-blue-light); font-size:13px;">
                                ${user.username || user.email.split('@')[0]}
                            </code>
                        </td>
                        <td style="font-weight:600;">${user.name}</td>
                        <td>${pwChanged}</td>
                        <td style="color:var(--gray-text); font-size:13px;">${createdDate}</td>
                        <td style="display:flex; gap:8px; flex-wrap:wrap;">${actionCell}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // ===== ユーザー作成 =====
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('create-user-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const token = localStorage.getItem('token');
                const data = {
                    username: document.getElementById('new-username').value.trim(),
                    name:     document.getElementById('new-name').value.trim(),
                    role:     '生徒' // 固定
                };
                if (!data.username) { showAlert('ユーザー名を入力してください', 'error'); return; }
                try {
                    const res = await fetch(`${API_URL}/admin/users`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(data)
                    });
                    const result = await res.json();
                    if (!res.ok) throw new Error(result.error || 'アカウント作成に失敗しました');
                    showAlert(`✅ 生徒アカウント「${result.name}」を作成しました（初期PW: 1111）`, 'success');
                    document.getElementById('new-username').value = '';
                    document.getElementById('new-name').value = '';
                    loadStudentUsers();
                } catch (err) {
                    showAlert(err.message, 'error');
                }
            });
        });

        // ===== ユーザー削除（管理者のみ） =====
        async function deleteUser(userId, userName) {
            if (!confirm(`「${userName}」を削除しますか？`)) return;
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`${API_URL}/admin/users/${userId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) { const e = await res.json(); throw new Error(e.error || '削除失敗'); }
                showAlert('削除しました', 'success');
                loadStudentUsers();
            } catch (err) { showAlert(err.message, 'error'); }
        }

        // ===== アラート =====
        function showAlert(message, type) {
            const el = document.getElementById('alert-container');
            el.innerHTML = `<div class="alert alert-${type === 'error' ? 'error' : 'success'}">${message}</div>`;
            setTimeout(() => el.innerHTML = '', 6000);
        }

        // ===== ログアウト =====
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }

        // ===== ロールに応じたナビ生成 =====
        function buildNav(elementId, role, activePath) {
            const links = [
                { href: '/dashboard',                label: '📊 ダッシュボード',         roles: ['管理者', 'クルー', 'セールス'] },
                { href: '/admin/accounts',           label: '👥 管理者用アカウント管理', roles: ['管理者'] },
                { href: '/admin/students-accounts',  label: '🎓 生徒用アカウント管理',   roles: ['管理者', 'セールス'] },
                { href: '/admin/contents',           label: '📹 コンテンツ管理',         roles: ['管理者'] },
                { href: '/admin/users',              label: '📈 ユーザー進捗管理',       roles: ['管理者', 'クルー'] },
                { href: '/students',                 label: '📋 生徒一覧',               roles: ['管理者', 'クルー', 'セールス'] },
            ];
            const el = document.getElementById(elementId);
            el.innerHTML = links
                .filter(l => l.roles.includes(role))
                .map(l => `<a href="${l.href}" class="nav-link${l.href === activePath ? ' active' : ''}">${l.label}</a>`)
                .join('');
            el.style.display = 'flex';
        }

        checkAuth();
    </script>
</body>
</html>
