<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レッスン - WannaV エントリープラン</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1 class="logo">✨ WannaV エントリープラン</h1>
            <div class="user-info">
                <span class="user-name" id="user-name"></span>
                <a href="/dashboard" class="btn btn-secondary">📊 ダッシュボードへ</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="alert-container"></div>

        <!-- レッスン情報 -->
        <div class="card">
            <h1 id="lesson-title" style="color: var(--primary-blue-light); margin-bottom: 10px;">Loading...</h1>
            <p id="lesson-description" style="color: var(--gray-text);"></p>
        </div>

        <!-- 動画プレーヤー（JS で動的生成） -->
        <div id="video-container" class="video-outer">
            <div class="loading" style="margin: 60px auto; display: block;"></div>
        </div>

        <!-- ===== MP4専用: 視聴進捗バー ===== -->
        <div id="watch-progress-section" style="display:none;" class="card" style="padding: 20px 30px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span style="font-weight:700; font-size:15px;">📺 視聴進捗</span>
                <span id="watch-percent-label" style="font-weight:700; color:var(--accent-cyan); font-size:18px;">0%</span>
            </div>
            <div class="progress-bar" style="height:22px;">
                <div class="progress-fill" id="watch-progress-fill" style="width:0%; background: linear-gradient(90deg, var(--primary-blue), var(--accent-cyan));"></div>
            </div>
            <p id="watch-progress-hint" style="color:var(--gray-text); font-size:13px; margin-top:8px;">
                動画を最後まで視聴するとクイズが表示されます
            </p>
        </div>

        <!-- ===== iframe用: 手動完了ボタン ===== -->
        <div id="manual-complete-section" style="display:none;">
            <div class="card" style="text-align:center; padding: 28px;">
                <p style="color:var(--gray-text); margin-bottom:20px; font-size:15px;">
                    動画の視聴が終わったら「視聴完了」ボタンを押してください
                </p>
                <button onclick="manualComplete()" class="btn btn-primary" style="font-size:17px; padding: 16px 50px;">
                    ✅ 視聴完了にする
                </button>
            </div>
        </div>

        <!-- クイズセクション -->
        <div class="card" id="quiz-section" style="display: none;">
            <h2 style="margin-bottom: 30px;">📝 小テスト（全問正解で次のレッスンへ！）</h2>
            <div id="quiz-container"></div>
            <button onclick="submitQuiz()" class="btn btn-success" style="width: 100%; margin-top: 30px;">
                ✅ 回答を提出
            </button>
        </div>

        <!-- 完了メッセージ -->
        <div class="card" id="completion-section" style="display: none; text-align: center;">
            <h2 style="color: var(--success); font-size: 36px; margin-bottom: 20px;">
                🎉 おめでとうございます！
            </h2>
            <p style="font-size: 22px; color: var(--primary-blue-light); margin-bottom: 30px;">
                レッスンを完了しました！素晴らしい！
            </p>
            <p style="color: var(--gray-text); margin-bottom: 40px;">
                この調子でどんどん成長していきましょう！
            </p>
            <a href="/dashboard" class="btn btn-primary" style="font-size: 20px; padding: 20px 50px;">
                📚 次のレッスンへ
            </a>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let currentLesson = null;
        let questions = [];
        let selectedAnswers = {};
        let progressSaveTimer = null;
        let lastSavedPercent = 0;
        let currentWatchPercent = 0; // 現在の視聴率（ページ離脱時に使用）
        const lessonId = window.location.pathname.split('/').pop();

        // ページ離脱時に現在の視聴率を同期保存（navigator.sendBeacon 使用）
        window.addEventListener('beforeunload', () => {
            if (currentWatchPercent > lastSavedPercent && currentLesson && !currentLesson.completed) {
                const token = localStorage.getItem('token');
                const payload = JSON.stringify({ percent: currentWatchPercent });
                navigator.sendBeacon(
                    `${API_URL}/lessons/${lessonId}/watch-progress`,
                    new Blob([payload], { type: 'application/json' })
                );
            }
        });

        // ページ読み込み
        async function loadLesson() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/'; return; }

            try {
                const userRes = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const user = await userRes.json();
                document.getElementById('user-name').textContent = user.name;
            } catch (e) { console.error(e); }

            try {
                const response = await fetch(`${API_URL}/lessons/${lessonId}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if (!response.ok) {
                    if (response.status === 403) {
                        showAlert('前のレッスンを完了してください', 'error');
                        setTimeout(() => window.location.href = '/dashboard', 2000);
                        return;
                    }
                    throw new Error('レッスンの取得に失敗しました');
                }
                const data = await response.json();
                currentLesson = data.lesson;
                questions = data.questions;
                renderLesson();
                recordView(lessonId);
            } catch (error) {
                console.error(error);
                showAlert('レッスンの読み込みに失敗しました', 'error');
            }
        }

        // ===== レッスン描画 =====
        function renderLesson() {
            document.getElementById('lesson-title').textContent = currentLesson.title;
            document.getElementById('lesson-description').textContent =
                currentLesson.description || '';

            const videoUrl = currentLesson.video_url;
            const container = document.getElementById('video-container');

            // ===== 既に完了済みの場合は完了画面を即表示 =====
            if (currentLesson.completed) {
                document.getElementById('completion-section').style.display = 'block';
                // 動画は引き続き視聴できるよう描画する（以下で実施）
            }

            if (isYouTubeUrl(videoUrl)) {
                buildIframe(container, getYouTubeEmbedUrl(videoUrl),
                    'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');
                showIframeControls();

            } else if (isVimeoUrl(videoUrl)) {
                buildIframe(container, getVimeoEmbedUrl(videoUrl),
                    'autoplay; fullscreen; picture-in-picture');
                showIframeControls();

            } else if (isGoogleDriveUrl(videoUrl)) {
                buildIframe(container, getGoogleDriveEmbedUrl(videoUrl), 'autoplay');
                showIframeControls();

            } else {
                // ===== MP4ファイル =====
                container.className = 'video-outer video-file-container';
                container.innerHTML = `
                    <video id="video-player" controls controlsList="nodownload"
                        style="width:100%;display:block;border-radius:14px;">
                        <source src="${videoUrl}" type="video/mp4">
                        お使いのブラウザは動画再生に対応していません。
                    </video>
                `;
                initMp4Player();
            }
        }

        // ===== iframeビルド =====
        function buildIframe(container, embedUrl, allowStr) {
            container.className = 'video-outer video-iframe-container';
            container.innerHTML = `
                <iframe src="${embedUrl}" allow="${allowStr}" allowfullscreen
                    style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;">
                </iframe>
            `;
        }

        // ===== iframe用コントロール =====
        function showIframeControls() {
            // 既に完了済みなら手動ボタンは不要
            if (currentLesson.completed) {
                document.getElementById('manual-complete-section').style.display = 'none';
                return;
            }
            document.getElementById('manual-complete-section').style.display = 'block';
            // クイズがある場合もボタン表示（視聴後に手動でクイズへ）
            if (questions.length > 0) {
                const btn = document.createElement('button');
                btn.id = 'quiz-skip-btn';
                btn.textContent = '📝 クイズに進む';
                btn.className = 'btn btn-primary';
                btn.style.cssText = 'margin: 16px 0; display: block; width: 100%;';
                btn.onclick = () => {
                    document.getElementById('manual-complete-section').style.display = 'none';
                    btn.remove();
                    showQuiz();
                };
                document.getElementById('manual-complete-section').after(btn);
            }
        }

        // ===== MP4プレーヤー初期化 =====
        function initMp4Player() {
            const video = document.getElementById('video-player');
            const progressSection = document.getElementById('watch-progress-section');

            // 既に完了済みの場合: バーは非表示（完了画面を表示済み）
            if (currentLesson.completed) {
                progressSection.style.display = 'none';
                return;
            }

            progressSection.style.display = 'block';

            // 既存の視聴率を復元（ページ読み込み直後に即反映してリセットを防ぐ）
            const savedPercent = currentLesson.watch_percent || 0;
            currentWatchPercent = savedPercent;
            lastSavedPercent = savedPercent;
            if (savedPercent > 0) {
                updateWatchBar(savedPercent);
            }

            // timeupdate: 1秒ごとに視聴率を計算・表示
            video.addEventListener('timeupdate', () => {
                if (!video.duration || video.duration === 0) return;
                const percent = Math.round((video.currentTime / video.duration) * 100);
                // 常に最大値のみ更新（巻き戻しで下がらないようにする）
                if (percent > currentWatchPercent) {
                    currentWatchPercent = percent;
                    updateWatchBar(percent);
                }

                // 5%刻みでAPIに保存
                if (percent - lastSavedPercent >= 5) {
                    saveWatchPercent(percent);
                    lastSavedPercent = percent;
                }
            });

            // ended: 100%視聴完了
            video.addEventListener('ended', () => {
                currentWatchPercent = 100;
                updateWatchBar(100);
                saveWatchPercent(100, true); // auto_complete フラグ
            });

            // loadedmetadata: 動画時間が判明したときヒント更新
            video.addEventListener('loadedmetadata', () => {
                const min = Math.floor(video.duration / 60);
                const sec = Math.floor(video.duration % 60);
                document.getElementById('watch-progress-hint').textContent =
                    `動画を95%以上視聴すると${questions.length > 0 ? 'クイズが表示' : '履修済みに自動変更'}されます（全${min}分${sec}秒）`;
            });
        }

        // ===== 視聴バー更新 =====
        function updateWatchBar(percent) {
            document.getElementById('watch-progress-fill').style.width = percent + '%';
            document.getElementById('watch-percent-label').textContent = percent + '%';

            // 色変化: 0-49%=青, 50-94%=シアン, 95-100%=緑
            const fill = document.getElementById('watch-progress-fill');
            if (percent >= 95) {
                fill.style.background = 'linear-gradient(90deg, #2ECC71, #1ABC9C)';
                document.getElementById('watch-percent-label').style.color = '#6AEBB7';
            } else if (percent >= 50) {
                fill.style.background = 'linear-gradient(90deg, var(--primary-blue), var(--accent-cyan))';
            }
        }

        // ===== 視聴率をAPIに保存 =====
        async function saveWatchPercent(percent, isEnd = false) {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`${API_URL}/lessons/${lessonId}/watch-progress`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ percent })
                });
                const data = await res.json();

                if (data.auto_completed) {
                    // クイズなし・95%超で自動完了
                    onLessonComplete(true);
                } else if (data.show_quiz) {
                    // 95%超 & クイズあり → クイズへ
                    document.getElementById('watch-progress-hint').textContent =
                        '視聴完了！下のクイズに答えて履修を完了しましょう 🎉';
                    setTimeout(() => showQuiz(), 600);
                } else if (isEnd && questions.length > 0) {
                    // 100%視聴 & クイズあり → クイズへ（念のため）
                    document.getElementById('watch-progress-hint').textContent =
                        '視聴完了！下のクイズに答えて履修を完了しましょう 🎉';
                    setTimeout(() => showQuiz(), 800);
                } else if (isEnd && questions.length === 0) {
                    onLessonComplete(true);
                }
            } catch (e) {
                console.error('視聴率保存エラー:', e);
            }
        }

        // ===== 手動完了（iframe用） =====
        async function manualComplete() {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`${API_URL}/lessons/${lessonId}/manual-complete`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                if (!res.ok) throw new Error();

                // クイズがある場合はクイズへ、ない場合は完了
                if (questions.length > 0) {
                    document.getElementById('manual-complete-section').style.display = 'none';
                    const skipBtn = document.getElementById('quiz-skip-btn');
                    if (skipBtn) skipBtn.remove();
                    showQuiz();
                } else {
                    onLessonComplete(false);
                }
            } catch (e) {
                showAlert('完了登録に失敗しました', 'error');
            }
        }

        // ===== 完了演出 =====
        function onLessonComplete(autoCompleted) {
            document.getElementById('watch-progress-section').style.display = 'none';
            document.getElementById('manual-complete-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'none';
            const cs = document.getElementById('completion-section');
            cs.style.display = 'block';
            cs.scrollIntoView({ behavior: 'smooth' });
        }

        // ===== 視聴記録 =====
        async function recordView(lessonId) {
            const token = localStorage.getItem('token');
            try {
                await fetch(`${API_URL}/lessons/${lessonId}/view`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
            } catch (e) { console.error(e); }
        }

        // ===== URL判定ユーティリティ =====
        function isYouTubeUrl(url) {
            return url && (url.includes('youtube.com') || url.includes('youtu.be'));
        }
        function isVimeoUrl(url) {
            return url && url.includes('vimeo.com');
        }
        function isGoogleDriveUrl(url) {
            return url && url.includes('drive.google.com');
        }
        function getYouTubeEmbedUrl(url) {
            let videoId = '';
            if (url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split('?')[0];
            else if (url.includes('v=')) videoId = url.split('v=')[1].split('&')[0];
            else if (url.includes('/embed/')) return url;
            return `https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1`;
        }
        function getVimeoEmbedUrl(url) {
            const match = url.match(/vimeo\.com\/(\d+)/);
            return match ? `https://player.vimeo.com/video/${match[1]}` : url;
        }
        function getGoogleDriveEmbedUrl(url) {
            const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (match) return `https://drive.google.com/file/d/${match[1]}/preview`;
            const match2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (match2) return `https://drive.google.com/file/d/${match2[1]}/preview`;
            return url;
        }

        // ===== クイズ =====
        function showQuiz() {
            const qs = document.getElementById('quiz-section');
            qs.style.display = 'block';
            qs.scrollIntoView({ behavior: 'smooth' });
            let html = '';
            questions.forEach((q, index) => {
                html += `
                    <div class="quiz-question">
                        <h3 style="color: var(--primary-blue-light); margin-bottom: 20px;">
                            問題 ${index + 1}: ${q.question}
                        </h3>
                        <div class="quiz-options">
                            ${q.options.map((option, optIndex) => `
                                <div class="quiz-option"
                                    onclick="selectAnswer(${index}, ${optIndex})"
                                    id="option-${index}-${optIndex}">
                                    ${option}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            document.getElementById('quiz-container').innerHTML = html;
        }

        function selectAnswer(questionIndex, optionIndex) {
            questions[questionIndex].options.forEach((_, i) => {
                const el = document.getElementById(`option-${questionIndex}-${i}`);
                if (el) el.classList.remove('selected');
            });
            const el = document.getElementById(`option-${questionIndex}-${optionIndex}`);
            if (el) el.classList.add('selected');
            selectedAnswers[questionIndex] = optionIndex;
        }

        async function submitQuiz() {
            if (Object.keys(selectedAnswers).length !== questions.length) {
                showAlert('全ての問題に回答してください', 'error');
                return;
            }
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`${API_URL}/lessons/${lessonId}/quiz`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ answers: selectedAnswers })
                });
                const result = await response.json();
                if (result.passed) {
                    onLessonComplete(false);
                } else {
                    showAlert(
                        `残念！${result.correct}/${result.total}問正解でした。全問正解が必要です。もう一度チャレンジ！`,
                        'error'
                    );
                    selectedAnswers = {};
                    setTimeout(() => showQuiz(), 2000);
                }
            } catch (e) {
                console.error(e);
                showAlert('クイズの提出に失敗しました', 'error');
            }
        }

        // ===== アラート =====
        function showAlert(message, type) {
            const container = document.getElementById('alert-container');
            container.innerHTML = `
                <div class="alert alert-${type === 'error' ? 'error' : 'success'}">
                    ${message}
                </div>
            `;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        loadLesson();
    </script>
</body>
</html>
