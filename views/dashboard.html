<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダッシュボード - WannaV エントリープラン</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1 class="logo">✨ WannaV エントリープラン</h1>
            <div class="user-info">
                <span class="user-name" id="user-name"></span>
                <span class="user-role" id="user-role"></span>
                <button onclick="logout()" class="btn btn-secondary">ログアウト</button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- 管理者メニュー（権限に応じて動的生成） -->
        <div id="admin-menu" class="nav" style="display: none;"></div>

        <!-- 進捗統計 -->
        <div class="dashboard-grid">
            <div class="stat-card">
                <div class="stat-value" id="completion-rate">0%</div>
                <div class="stat-label">履修進捗率</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completed-lessons">0</div>
                <div class="stat-label">完了レッスン数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-lessons">0</div>
                <div class="stat-label">総レッスン数</div>
            </div>
        </div>

        <!-- 進捗バー -->
        <div class="card">
            <h2 style="margin-bottom: 20px;">🎯 全体の進捗</h2>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                <span class="progress-text" id="progress-text">0%</span>
            </div>
        </div>

        <!-- レッスン一覧 -->
        <div class="card">
            <h2 style="margin-bottom: 30px;">📚 レッスン一覧</h2>
            <div id="lessons-container">
                <div class="loading" style="margin: 50px auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let currentUser = null;

        // 認証チェック
        async function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('認証失敗');

                currentUser = await response.json();
                document.getElementById('user-name').textContent = currentUser.name;
                document.getElementById('user-role').textContent = currentUser.role;

                // 管理者メニュー表示
                if (currentUser.role === '管理者' || currentUser.role === 'クルー' || currentUser.role === 'セールス') {
                    buildNav('admin-menu', currentUser.role, '/dashboard');
                }

                loadDashboard();
            } catch (error) {
                console.error('認証エラー:', error);
                localStorage.removeItem('token');
                window.location.href = '/';
            }
        }

        // ダッシュボード読み込み
        async function loadDashboard() {
            const token = localStorage.getItem('token');

            try {
                // 進捗統計
                const progressRes = await fetch(`${API_URL}/progress`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const progressData = await progressRes.json();
                const stats = progressData.stats;

                document.getElementById('completion-rate').textContent = 
                    Math.round(stats.completion_percentage || 0) + '%';
                document.getElementById('completed-lessons').textContent = stats.completed_lessons || 0;
                document.getElementById('total-lessons').textContent = stats.total_lessons || 0;

                const percentage = Math.round(stats.completion_percentage || 0);
                document.getElementById('progress-fill').style.width = percentage + '%';
                document.getElementById('progress-text').textContent = percentage + '%';

                // レッスン一覧
                const lessonsRes = await fetch(`${API_URL}/lessons`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const lessons = await lessonsRes.json();

                renderLessons(lessons, currentUser.role);
            } catch (error) {
                console.error('データ読み込みエラー:', error);
                document.getElementById('lessons-container').innerHTML = 
                    '<p style="color: var(--danger);">データの読み込みに失敗しました</p>';
            }
        }

        // レッスン描画
        function renderLessons(lessons, userRole) {
            const container = document.getElementById('lessons-container');
            const isAdmin = userRole === '管理者';
            
            if (lessons.length === 0) {
                container.innerHTML = '<p style="color: var(--gray-text);">レッスンがまだありません</p>';
                return;
            }

            let html = '<div class="lessons-grid">';
            
            lessons.forEach((lesson, index) => {
                const isCompleted = lesson.completed;
                // 管理者は全レッスンをロックなしで開放
                const isLocked = isAdmin ? false : (index > 0 && !lessons[index - 1].completed);
                const canAccess = isAdmin ? true : (index === 0 || lessons[index - 1].completed);

                // サムネイル生成
                const thumb = getThumbnail(lesson.video_url, lesson.thumbnail_url);

                // カテゴリタグの色
                const tagColor = getCourseTagColor(lesson.course_title);

                const cardClass = 'lesson-card' +
                    (isCompleted ? ' completed' : '') +
                    (isLocked   ? ' locked'    : '');

                const overlayIcon = isCompleted ? '✅' : isLocked ? '🔒' : '▶';
                const overlayClass = isCompleted ? 'thumb-overlay completed' : isLocked ? 'thumb-overlay locked' : 'thumb-overlay play';

                const linkStart = canAccess ? `<a href="/lesson/${lesson.id}" class="lesson-card-link">` : `<div class="lesson-card-link no-pointer">`;
                const linkEnd   = canAccess ? `</a>` : `</div>`;

                const wp = lesson.watch_percent || 0;
                // 視聴進捗バー: 完了・未完了・未視聴・ロック中すべて表示
                // ロック中は表示しない、完了はグリーン100%、それ以外は実際の進捗
                let watchBarHtml = '';
                if (!isLocked) {
                    if (isCompleted) {
                        watchBarHtml = `
                            <div class="lesson-watch-bar-wrap">
                                <div class="lesson-watch-bar-header">
                                    <span>視聴進捗</span><span class="lesson-watch-bar-pct done">100%</span>
                                </div>
                                <div class="lesson-watch-bar-bg">
                                    <div class="lesson-watch-bar-fill done" style="width:100%;"></div>
                                </div>
                            </div>
                        `;
                    } else {
                        const pctColor = wp >= 95 ? 'near' : wp >= 50 ? 'mid' : 'low';
                        watchBarHtml = `
                            <div class="lesson-watch-bar-wrap">
                                <div class="lesson-watch-bar-header">
                                    <span>視聴進捗</span><span class="lesson-watch-bar-pct ${pctColor}">${wp}%</span>
                                </div>
                                <div class="lesson-watch-bar-bg">
                                    <div class="lesson-watch-bar-fill ${pctColor}" style="width:${wp}%;"></div>
                                </div>
                            </div>
                        `;
                    }
                }

                html += `
                    ${linkStart}
                    <div class="${cardClass}">
                        <!-- サムネイル -->
                        <div class="lesson-thumb-wrap">
                            ${thumb.type === 'img'
                                ? `<img src="${thumb.src}" alt="${lesson.title}" class="lesson-thumb-img" loading="lazy">`
                                : `<div class="lesson-thumb-placeholder"><span>${thumb.emoji}</span></div>`
                            }
                            <div class="${overlayClass}">
                                <span class="overlay-icon">${overlayIcon}</span>
                            </div>
                            ${isCompleted ? '<div class="thumb-badge-done">✅ 完了</div>' : ''}
                        </div>
                        <!-- 情報 -->
                        <div class="lesson-card-body">
                            <div class="lesson-card-title">${lesson.title}</div>
                            <div class="lesson-card-meta">
                                <span class="lesson-tag" style="background:${tagColor.bg}; color:${tagColor.text};">${lesson.course_title || 'コース'}</span>
                                ${isCompleted ? '<span class="lesson-tag-done">✅ 学習済み</span>' : ''}
                                ${isLocked ? '<span class="lesson-tag-locked">🔒 ロック中</span>' : ''}
                            </div>
                            ${watchBarHtml}
                        </div>
                    </div>
                    ${linkEnd}
                `;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        // サムネイル取得ロジック
        function getThumbnail(videoUrl, thumbnailUrl) {
            // 1. DBに保存されたサムネイル（MP4アップロード時に自動生成）
            if (thumbnailUrl) {
                return { type: 'img', src: thumbnailUrl };
            }

            if (!videoUrl) return { type: 'placeholder', emoji: '🎬' };

            // 2. YouTube: 動画IDからサムネイルURL自動生成
            const ytMatch = videoUrl.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
            if (ytMatch) {
                return { type: 'img', src: `https://img.youtube.com/vi/${ytMatch[1]}/mqdefault.jpg` };
            }

            // 3. Vimeo (APIなしのデフォルトサムネイル)
            if (videoUrl.includes('vimeo.com')) {
                return { type: 'placeholder', emoji: '🎥' };
            }

            // 4. Google Drive
            if (videoUrl.includes('drive.google.com')) {
                return { type: 'placeholder', emoji: '📁' };
            }

            // 5. 直接動画ファイル（サムネイル未生成）
            if (videoUrl.match(/\.(mp4|mov|avi|mkv)$/i)) {
                return { type: 'placeholder', emoji: '📹' };
            }

            return { type: 'placeholder', emoji: '🎬' };
        }

        // コースごとのタグカラー（ローテーション）
        const TAG_COLORS = [
            { bg: 'rgba(74,144,217,0.25)',  text: '#6FB3F5' },
            { bg: 'rgba(52,200,232,0.2)',   text: '#34C8E8' },
            { bg: 'rgba(155,89,182,0.25)',  text: '#BF8FE0' },
            { bg: 'rgba(46,204,113,0.2)',   text: '#6AEBB7' },
            { bg: 'rgba(243,156,18,0.2)',   text: '#F7C55B' },
            { bg: 'rgba(231,76,60,0.2)',    text: '#F1948A' },
        ];
        const _tagMap = {};
        let _tagIdx = 0;
        function getCourseTagColor(course) {
            const key = course || 'default';
            if (!_tagMap[key]) {
                _tagMap[key] = TAG_COLORS[_tagIdx % TAG_COLORS.length];
                _tagIdx++;
            }
            return _tagMap[key];
        }

        // ログアウト
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }

        // ===== ロールに応じたナビ生成 =====
        function buildNav(elementId, role, activePath) {
            const isAdmin = role === '管理者';
            const links = [
                { href: '/dashboard',       label: '📊 ダッシュボード',     roles: ['管理者', 'クルー', 'セールス'] },
                { href: '/admin/accounts',  label: '👥 アカウント管理',     roles: ['管理者', 'セールス'] },
                { href: '/admin/contents',  label: '📹 コンテンツ管理',     roles: ['管理者'] },
                { href: '/admin/users',     label: '📈 ユーザー進捗管理',   roles: ['管理者', 'クルー'] },
                { href: '/students',        label: '🎓 生徒一覧',           roles: ['管理者', 'クルー', 'セールス'] },
            ];
            const el = document.getElementById(elementId);
            el.innerHTML = links
                .filter(l => l.roles.includes(role))
                .map(l => `<a href="${l.href}" class="nav-link${l.href === activePath ? ' active' : ''}">${l.label}</a>`)
                .join('');
            el.style.display = 'flex';
        }

        // 初期化
        checkAuth();
    </script>
</body>
</html>
