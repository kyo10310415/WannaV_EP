<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生徒一覧 - WannaV エントリープラン</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* ===== Students ページ専用スタイル ===== */
        .students-header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }

        .sync-info {
            font-size: 13px;
            color: var(--gray-text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sync-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: rgba(74,144,217,0.12);
            border: 1px solid rgba(74,144,217,0.3);
            border-radius: 20px;
            font-size: 12px;
            color: var(--primary-blue-light);
        }

        /* 検索バー */
        .search-wrap {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            max-width: 400px;
            padding: 10px 16px;
            border: 1px solid rgba(74,144,217,0.35);
            border-radius: 25px;
            background: rgba(7,16,24,0.7);
            color: var(--light-text);
            font-size: 14px;
        }

        .search-input::placeholder { color: rgba(148,184,212,0.5); }
        .search-input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(74,144,217,0.2);
        }

        /* テーブルラッパー（横スクロール） */
        .table-wrap {
            overflow-x: auto;
            border-radius: 14px;
        }

        /* 生徒テーブル */
        .students-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 6px;
            min-width: 900px;
        }

        .students-table th {
            background: linear-gradient(45deg, var(--primary-blue-dark), var(--primary-blue));
            padding: 12px 14px;
            text-align: left;
            font-weight: 700;
            font-size: 13px;
            color: white;
            white-space: nowrap;
        }

        .students-table th:first-child { border-radius: 10px 0 0 10px; }
        .students-table th:last-child  { border-radius: 0 10px 10px 0; }

        .students-table td {
            background: rgba(23,42,63,0.75);
            padding: 13px 14px;
            font-size: 13px;
            border-top: 1px solid rgba(74,144,217,0.1);
            border-bottom: 1px solid rgba(74,144,217,0.1);
            vertical-align: middle;
        }

        .students-table tr:hover td {
            background: rgba(74,144,217,0.1);
        }

        /* ステータスバッジ */
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }

        .status-active   { background: rgba(46,204,113,0.18); color: #6AEBB7; border: 1px solid rgba(46,204,113,0.3); }
        .status-pause    { background: rgba(243,156,18,0.18);  color: #F7C55B; border: 1px solid rgba(243,156,18,0.3); }
        .status-stop     { background: rgba(231,76,60,0.18);   color: #F1948A; border: 1px solid rgba(231,76,60,0.3); }
        .status-default  { background: rgba(148,184,212,0.12); color: var(--gray-text); border: 1px solid rgba(148,184,212,0.2); }

        /* 経過月数バッジ */
        .month-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(74,144,217,0.15);
            color: var(--primary-blue-light);
            font-size: 12px;
            font-weight: 700;
        }

        /* Notionリンクボタン */
        .notion-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            background: rgba(74,144,217,0.12);
            border: 1px solid rgba(74,144,217,0.3);
            border-radius: 20px;
            color: var(--primary-blue-light);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .notion-link:hover {
            background: rgba(74,144,217,0.25);
            border-color: var(--primary-blue-light);
            transform: translateY(-2px);
        }

        /* 学籍番号 */
        .student-number-code {
            font-family: monospace;
            font-size: 12px;
            background: rgba(52,200,232,0.1);
            color: var(--accent-cyan);
            padding: 2px 8px;
            border-radius: 6px;
        }

        /* 件数バッジ */
        .count-badge {
            display: inline-block;
            padding: 4px 14px;
            background: rgba(74,144,217,0.15);
            border: 1px solid rgba(74,144,217,0.3);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            color: var(--primary-blue-light);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-text);
        }

        .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { font-size: 15px; margin-bottom: 8px; }
        .empty-state small { font-size: 12px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1 class="logo">✨ WannaV エントリープラン</h1>
            <div class="user-info">
                <span class="user-name" id="user-name"></span>
                <span class="user-role" id="user-role"></span>
                <button onclick="logout()" class="btn btn-secondary">ログアウト</button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- ナビゲーション（権限に応じて動的生成） -->
        <div class="nav" id="admin-nav" style="display:none;"></div>

        <div id="alert-container"></div>

        <!-- ===== プロパティ確認モーダル ===== -->
        <div id="debug-modal" style="
            display:none; position:fixed; inset:0; z-index:2000;
            background:rgba(0,0,0,0.85); backdrop-filter:blur(6px);
            padding:20px; overflow-y:auto;">
            <div style="
                background:var(--card-bg); border:1px solid rgba(74,144,217,0.4);
                border-radius:20px; padding:32px; width:100%; max-width:720px;
                max-height:85vh; overflow-y:auto;
                box-shadow:0 20px 60px rgba(0,0,0,0.7);
                margin: 40px auto;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 style="margin:0; padding:0; font-size:18px;">🔍 Notion プロパティ名確認</h2>
                    <button onclick="closeDebugModal()" style="
                        background:none; border:none; color:var(--gray-text);
                        font-size:24px; cursor:pointer; line-height:1;">✕</button>
                </div>
                <p style="color:var(--gray-text); font-size:13px; margin-bottom:16px;">
                    下記が実際の Notion DB のプロパティ名です。<br>
                    <code style="background:rgba(74,144,217,0.12); padding:2px 6px; border-radius:4px; color:var(--accent-cyan);">notionSync.js</code> の
                    <code style="background:rgba(74,144,217,0.12); padding:2px 6px; border-radius:4px; color:var(--accent-cyan);">PROP</code>
                    オブジェクトと一致しているか確認してください。
                </p>
                <div id="debug-content">
                    <div class="loading" style="margin:30px auto;"></div>
                </div>
            </div>
        </div>

        <!-- 生徒一覧カード -->
        <div class="card">
            <div class="students-header-row">
                <div>
                    <h2 style="margin-bottom: 4px;">🎓 生徒一覧（エントリープラン）</h2>
                    <div class="sync-info">
                        <span id="last-synced-text">同期日時を取得中...</span>
                    </div>
                </div>
                <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
                    <span class="count-badge" id="student-count">0 名</span>
                    <button id="sync-btn" onclick="syncNotion()" class="btn btn-secondary"
                        style="padding:10px 20px; font-size:13px; min-height:auto; min-width:auto;">
                        🔄 今すぐ同期
                    </button>
                    <button onclick="showDebugProps()" class="btn btn-warning"
                        style="padding:10px 16px; font-size:12px; min-height:auto; min-width:auto;">
                        🔍 プロパティ確認
                    </button>
                </div>
            </div>

            <!-- 検索 -->
            <div class="search-wrap">
                <input
                    type="text"
                    class="search-input"
                    id="search-input"
                    placeholder="🔍 生徒名・ふりがな・学籍番号で検索..."
                    oninput="filterStudents()"
                >
                <select id="status-filter" class="form-select"
                    style="width:auto; min-width:160px; padding:10px 14px; font-size:13px;"
                    onchange="filterStudents()">
                    <option value="">すべてのステータス</option>
                    <option value="アクティブ" selected>アクティブ</option>
                    <option value="レッスン準備中">レッスン準備中</option>
                    <option value="正規退会">正規退会</option>
                    <option value="無断キャンセル">無断キャンセル</option>
                </select>
            </div>

            <!-- テーブル -->
            <div id="students-container">
                <div class="loading" style="margin: 50px auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let allStudents = [];
        let currentUser = null;

        // ===== 認証チェック =====
        async function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/'; return; }

            try {
                const res = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                // 401/403 はログイン画面へ
                if (res.status === 401 || res.status === 403) {
                    localStorage.removeItem('token');
                    window.location.href = '/';
                    return;
                }

                if (!res.ok) {
                    // その他エラーは画面に表示してハングさせない
                    const errData = await res.json().catch(() => ({}));
                    document.getElementById('students-container').innerHTML =
                        `<div class="empty-state"><div class="empty-icon">⚠️</div><p>認証エラー: ${errData.error || res.status}</p></div>`;
                    updateLastSynced(null);
                    return;
                }

                currentUser = await res.json();

                // needsPasswordChange チェック：初回PW未変更でも students は管理者なので通す
                document.getElementById('user-name').textContent = currentUser.name || '';
                document.getElementById('user-role').textContent = currentUser.role || '';

                if (currentUser.role === '管理者' || currentUser.role === 'クルー' || currentUser.role === 'セールス') {
                    buildNav('admin-nav', currentUser.role, '/students');
                    loadStudents();
                } else {
                    // 生徒はアクセス不可 → エラー表示してダッシュボードへ
                    document.getElementById('students-container').innerHTML =
                        `<div class="empty-state"><div class="empty-icon">🔒</div><p>このページは管理者・クルー・セールスのみアクセスできます</p></div>`;
                    updateLastSynced(null);
                    setTimeout(() => window.location.href = '/dashboard', 2500);
                }
            } catch (err) {
                console.error('checkAuth error:', err);
                // ネットワークエラー等 → ログイン画面ではなくエラー表示（ループ防止）
                document.getElementById('students-container').innerHTML =
                    `<div class="empty-state"><div class="empty-icon">📡</div><p>サーバーへの接続に失敗しました</p><small>${err.message}</small></div>`;
                updateLastSynced(null);
            }
        }

        // ===== 生徒データ読み込み =====
        async function loadStudents() {
            const token = localStorage.getItem('token');
            const container = document.getElementById('students-container');

            try {
                const res = await fetch(`${API_URL}/notion/students`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error || `HTTP ${res.status}`);
                }

                const data = await res.json();
                allStudents = data.students || [];
                updateLastSynced(data.lastSynced);
                filterStudents(); // デフォルト「アクティブ」で絞り込んで描画
            } catch (err) {
                console.error('生徒データ取得エラー:', err);
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>データの読み込みに失敗しました</p>
                        <small>${err.message}</small>
                        <br><br>
                        <button onclick="syncNotion()" class="btn btn-primary"
                            style="font-size:14px; padding:12px 24px; min-height:auto; min-width:auto;">
                            🔄 今すぐ Notion から同期する
                        </button>
                    </div>
                `;
            }
        }

        // ===== 手動 Notion 同期 =====
        async function syncNotion() {
            const token = localStorage.getItem('token');
            const btn = document.getElementById('sync-btn');
            btn.disabled = true;
            btn.textContent = '⏳ 同期中...';

            try {
                const res = await fetch(`${API_URL}/notion/sync`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || '同期に失敗しました');
                }

                showAlert(`✅ ${data.message}`, 'success');
                loadStudents(); // 再読み込み
            } catch (err) {
                console.error('Notion sync error:', err);
                showAlert(err.message || 'Notion 同期に失敗しました', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 今すぐ同期';
            }
        }

        // ===== 生徒テーブルを描画 =====
        function renderStudents(students) {
            const container = document.getElementById('students-container');
            document.getElementById('student-count').textContent = `${students.length} 名`;

            if (students.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🎓</div>
                        <p>エントリープランの生徒データがありません</p>
                        <small>「今すぐ同期」ボタンで Notion から取得してください</small>
                    </div>
                `;
                return;
            }

            const today = new Date();

            let html = `
                <div class="table-wrap">
                    <table class="students-table">
                        <thead>
                            <tr>
                                <th>生徒名</th>
                                <th>本名ふりがな</th>
                                <th>学籍番号</th>
                                <th>Notion</th>
                                <th>開始月</th>
                                <th>経過月数</th>
                                <th>ステータス</th>
                                <th>契約プラン</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            students.forEach(s => {
                // ===== 経過月数計算 =====
                // 「1ヶ月目からカウント」= 開始月が今月なら 1ヶ月目
                let elapsedMonths = '—';
                if (s.lesson_start_month) {
                    const start = new Date(s.lesson_start_month);
                    // 年月差 + 1（開始月を1ヶ月目とする）
                    const yearDiff  = today.getFullYear() - start.getFullYear();
                    const monthDiff = today.getMonth() - start.getMonth();
                    const total = yearDiff * 12 + monthDiff + 1;
                    elapsedMonths = total > 0 ? total : 1;
                }

                // ===== ステータスバッジ =====
                const statusClass = getStatusClass(s.status);

                // ===== 開始月表示 =====
                let startMonthDisplay = '—';
                if (s.lesson_start_month) {
                    const d = new Date(s.lesson_start_month);
                    startMonthDisplay = `${d.getFullYear()}年${d.getMonth() + 1}月`;
                }

                // ===== Notion URL =====
                const notionBtn = s.notion_url
                    ? `<a href="${escHtml(s.notion_url)}" target="_blank" rel="noopener" class="notion-link">
                            📄 開く
                       </a>`
                    : '<span style="color:var(--gray-text); font-size:12px;">—</span>';

                html += `
                    <tr>
                        <td style="font-weight:600; color:var(--light-text);">${escHtml(s.student_name || '—')}</td>
                        <td style="color:var(--gray-text);">${escHtml(s.name_furigana || '—')}</td>
                        <td>
                            ${s.student_number
                                ? `<span class="student-number-code">${escHtml(s.student_number)}</span>`
                                : '<span style="color:var(--gray-text);">—</span>'
                            }
                        </td>
                        <td>${notionBtn}</td>
                        <td style="color:var(--gray-text); white-space:nowrap;">${startMonthDisplay}</td>
                        <td>
                            ${elapsedMonths !== '—'
                                ? `<span class="month-badge">${elapsedMonths} ヶ月目</span>`
                                : '<span style="color:var(--gray-text);">—</span>'
                            }
                        </td>
                        <td>
                            ${s.status
                                ? `<span class="status-badge ${statusClass}">${escHtml(s.status)}</span>`
                                : '<span style="color:var(--gray-text);">—</span>'
                            }
                        </td>
                        <td style="color:var(--accent-cyan); font-size:12px; font-weight:600;">
                            ${escHtml(s.contract_plan || '—')}
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        // ===== フィルタリング =====
        function filterStudents() {
            const query  = document.getElementById('search-input').value.toLowerCase().trim();
            const status = document.getElementById('status-filter').value;

            const filtered = allStudents.filter(s => {
                const matchSearch = !query ||
                    (s.student_name   || '').toLowerCase().includes(query) ||
                    (s.name_furigana  || '').toLowerCase().includes(query) ||
                    (s.student_number || '').toLowerCase().includes(query);

                const matchStatus = !status || s.status === status;

                return matchSearch && matchStatus;
            });

            renderStudents(filtered);
        }

        // ===== 最終同期日時の更新 =====
        function updateLastSynced(lastSynced) {
            const el = document.getElementById('last-synced-text');
            if (!lastSynced) {
                el.innerHTML = '<span class="sync-badge">⚠️ 未同期</span>';
            } else {
                const d = new Date(lastSynced);
                const fmt = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                el.innerHTML = `<span class="sync-badge">🕐 最終同期: ${fmt}</span>`;
            }
        }

        // ===== ステータスに応じた CSS クラス =====
        function getStatusClass(status) {
            if (!status) return 'status-default';
            if (status === 'アクティブ')      return 'status-active';
            if (status === 'レッスン準備中')   return 'status-pause';
            if (status === '正規退会')        return 'status-stop';
            if (status === '無断キャンセル')   return 'status-stop';
            return 'status-default';
        }

        // ===== XSS対策エスケープ =====
        function escHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ===== プロパティ確認デバッグ =====
        async function showDebugProps() {
            const token = localStorage.getItem('token');
            const modal = document.getElementById('debug-modal');
            const content = document.getElementById('debug-content');

            modal.style.display = 'block';
            content.innerHTML = '<div class="loading" style="margin:30px auto;"></div>';

            try {
                // まず raw_data から確認（同期済みデータがある場合は高速）
                const rawRes = await fetch(`${API_URL}/notion/debug-raw`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const rawData = await rawRes.json();

                // 次に Notion API から直接スキーマ取得
                const schemaRes = await fetch(`${API_URL}/notion/debug-props`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const schemaData = await schemaRes.json();

                let html = '';

                // ===== 現在の PROP 設定 =====
                html += `
                    <div style="background:rgba(7,16,24,0.6); border-radius:12px; padding:16px; margin-bottom:16px; border:1px solid rgba(74,144,217,0.2);">
                        <p style="font-size:12px; font-weight:700; color:var(--accent-cyan); margin-bottom:10px;">📌 notionSync.js の現在の PROP 設定</p>
                        <table style="width:100%; font-size:12px; border-collapse:collapse;">
                            <tr><th style="text-align:left; padding:4px 8px; color:var(--gray-text);">フィールド</th><th style="text-align:left; padding:4px 8px; color:var(--gray-text);">現在の設定値</th></tr>
                            <tr><td style="padding:4px 8px; color:var(--light-text);">生徒名</td><td style="padding:4px 8px; color:var(--accent-cyan); font-family:monospace;">生徒名</td></tr>
                            <tr><td style="padding:4px 8px; color:var(--light-text);">本名ふりがな</td><td style="padding:4px 8px; color:var(--accent-cyan); font-family:monospace;">本名ふりがな</td></tr>
                            <tr><td style="padding:4px 8px; color:var(--light-text);">学籍番号</td><td style="padding:4px 8px; color:var(--accent-cyan); font-family:monospace;">学籍番号</td></tr>
                            <tr><td style="padding:4px 8px; color:var(--light-text);">レッスン開始月</td><td style="padding:4px 8px; color:var(--accent-cyan); font-family:monospace;">レッスン開始月</td></tr>
                            <tr><td style="padding:4px 8px; color:var(--light-text);">ステータス</td><td style="padding:4px 8px; color:var(--accent-cyan); font-family:monospace;">ステータス</td></tr>
                            <tr><td style="padding:4px 8px; color:var(--light-text);">契約プラン</td><td style="padding:4px 8px; color:var(--accent-cyan); font-family:monospace;">契約プラン</td></tr>
                        </table>
                    </div>
                `;

                // ===== Notion DB の実際のプロパティ =====
                if (schemaData.schema) {
                    html += `
                        <p style="font-size:12px; font-weight:700; color:#6AEBB7; margin-bottom:8px;">
                            ✅ Notion DB「${escHtml(schemaData.dbTitle || '')}」の実際のプロパティ一覧
                        </p>
                        <div style="overflow-x:auto; margin-bottom:16px;">
                            <table style="width:100%; font-size:12px; border-collapse:collapse; min-width:400px;">
                                <thead>
                                    <tr style="background:rgba(74,144,217,0.15);">
                                        <th style="text-align:left; padding:8px 10px; color:var(--gray-text);">プロパティ名</th>
                                        <th style="text-align:left; padding:8px 10px; color:var(--gray-text);">型</th>
                                        <th style="text-align:left; padding:8px 10px; color:var(--gray-text);">選択肢</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;
                    for (const prop of schemaData.schema) {
                        const isUsed = ['生徒名','本名ふりがな','学籍番号','レッスン開始月','ステータス','契約プラン'].includes(prop.name);
                        html += `
                            <tr style="${isUsed ? 'background:rgba(46,204,113,0.08);' : ''}">
                                <td style="padding:7px 10px; font-family:monospace; font-weight:600; color:${isUsed ? '#6AEBB7' : 'var(--light-text)'};">
                                    ${isUsed ? '✅ ' : ''}${escHtml(prop.name)}
                                </td>
                                <td style="padding:7px 10px; color:var(--accent-cyan); font-size:11px;">${prop.type}</td>
                                <td style="padding:7px 10px; color:var(--gray-text); font-size:11px;">
                                    ${prop.options ? prop.options.map(o => `<span style="background:rgba(74,144,217,0.12); padding:1px 6px; border-radius:10px; margin:1px;">${escHtml(o)}</span>`).join(' ') : '—'}
                                </td>
                            </tr>
                        `;
                    }
                    html += '</tbody></table></div>';
                } else if (schemaData.error) {
                    html += `<div class="alert alert-error" style="margin:0 0 16px;">${escHtml(schemaData.error)}<br><small>${escHtml(schemaData.detail||'')}</small></div>`;
                }

                // ===== raw_data からのプロパティ（同期済みデータ） =====
                if (rawData.properties) {
                    html += `
                        <p style="font-size:12px; font-weight:700; color:var(--primary-blue-light); margin-bottom:8px;">
                            📦 DBキャッシュの raw_data から取得したプロパティ（サンプル1件目）
                        </p>
                        <div style="overflow-x:auto;">
                            <table style="width:100%; font-size:12px; border-collapse:collapse; min-width:400px;">
                                <thead>
                                    <tr style="background:rgba(74,144,217,0.15);">
                                        <th style="text-align:left; padding:8px 10px; color:var(--gray-text);">プロパティ名</th>
                                        <th style="text-align:left; padding:8px 10px; color:var(--gray-text);">型</th>
                                        <th style="text-align:left; padding:8px 10px; color:var(--gray-text);">値（プレビュー）</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;
                    for (const prop of rawData.properties) {
                        html += `
                            <tr>
                                <td style="padding:7px 10px; font-family:monospace; font-weight:600; color:var(--light-text);">${escHtml(prop.name)}</td>
                                <td style="padding:7px 10px; color:var(--accent-cyan); font-size:11px;">${prop.type}</td>
                                <td style="padding:7px 10px; color:var(--gray-text);">${escHtml(prop.preview)}</td>
                            </tr>
                        `;
                    }
                    html += '</tbody></table></div>';
                } else if (rawData.message) {
                    html += `<p style="color:var(--gray-text); font-size:13px; margin-top:12px;">📦 ${escHtml(rawData.message)}</p>`;
                }

                content.innerHTML = html;
            } catch (err) {
                content.innerHTML = `<div class="alert alert-error">プロパティ取得に失敗しました: ${err.message}</div>`;
            }
        }

        function closeDebugModal() {
            document.getElementById('debug-modal').style.display = 'none';
        }

        // モーダル外クリックで閉じる
        document.getElementById('debug-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('debug-modal')) closeDebugModal();
        });

        // ===== アラート =====
        function showAlert(message, type) {
            const el = document.getElementById('alert-container');
            el.innerHTML = `<div class="alert alert-${type === 'error' ? 'error' : 'success'}">${message}</div>`;
            setTimeout(() => el.innerHTML = '', 6000);
        }

        // ===== ログアウト =====
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }

        // ===== ロールに応じたナビ生成 =====
        function buildNav(elementId, role, activePath) {
            const links = [
                { href: '/dashboard',       label: '📊 ダッシュボード',     roles: ['管理者', 'クルー', 'セールス'] },
                { href: '/admin/accounts',  label: '👥 アカウント管理',     roles: ['管理者', 'セールス'] },
                { href: '/admin/contents',  label: '📹 コンテンツ管理',     roles: ['管理者'] },
                { href: '/admin/users',     label: '📈 ユーザー進捗管理',   roles: ['管理者', 'クルー'] },
                { href: '/students',        label: '🎓 生徒一覧',           roles: ['管理者', 'クルー', 'セールス'] },
            ];
            const el = document.getElementById(elementId);
            el.innerHTML = links
                .filter(l => l.roles.includes(role))
                .map(l => `<a href="${l.href}" class="nav-link${l.href === activePath ? ' active' : ''}">${l.label}</a>`)
                .join('');
            el.style.display = 'flex';
        }

        // 初期化
        checkAuth();
    </script>
</body>
</html>
